version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/workspace"
    target-branch: "develop"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "chore(deps)"
      include: "scope"

    pull-request-branch-name:
      separator: "-"

    labels:
      - "dependencies"
      - "rust"

    groups:
      rust-dependencies:
        patterns:
          - "*"

    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

    versioning-strategy: "auto"

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(build)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
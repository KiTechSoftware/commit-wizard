name: publish-release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: v
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether tag exists
        id: tagcheck
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse "${{ steps.v.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          git tag "${{ steps.v.outputs.tag }}"
          git push origin "${{ steps.v.outputs.tag }}"

      - name: Create release
        if: steps.tagcheck.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.v.outputs.tag }}" --generate-notes
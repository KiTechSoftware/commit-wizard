name: Create Branch (release/hotfix/sync)

on:
  workflow_dispatch:
    inputs:
      branch_type:
        description: Branch to create
        required: true
        default: release
        type: choice
        options:
          - release
          - hotfix
          - sync
      planned_release:
        description: Whether this is a planned release (only applies to release branches)
        required: true
        default: true
        type: boolean
      create_pr:
        description: Whether to create a PR (only applies to release and sync branches)
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  resolve-version-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
    steps:
      - id: resolve
        shell: bash
        run: |
          if [[ "${{ inputs.branch_type }}" == "hotfix" ]]; then
            echo "mode=hotfix" >> "$GITHUB_OUTPUT"
          else
            echo "mode=release" >> "$GITHUB_OUTPUT"
          fi

  next-version:
    needs: [resolve-version-mode]
    uses: KiTechSoftware/stability-flow/.github/workflows/next-version.yml@main
    with:
      mode: ${{ needs.resolve-version-mode.outputs.mode }}

  resolve-release-source:
    if: ${{ inputs.branch_type == 'release' }}
    needs: [next-version]
    runs-on: ubuntu-latest
    outputs:
      source_branch: ${{ steps.resolve.outputs.source_branch }}
    steps:
      - id: resolve
        shell: bash
        run: |
          if [[ ${{ inputs.planned_release }} == true ]]; then
            echo "source_branch=develop" >> "$GITHUB_OUTPUT"
          else
            echo "source_branch=hotfix/${{ needs.next-version.outputs.next_version }}" >> "$GITHUB_OUTPUT"
          fi

  create-release-branch:
    if: ${{ inputs.branch_type == 'release' }}
    needs: [next-version, resolve-release-source]
    uses: KiTechSoftware/stability-flow/.github/workflows/create-release-branch.yml@main
    with:
      source_branch: ${{ needs.resolve-release-source.outputs.source_branch }}
      identifier: ${{ needs.next-version.outputs.next_version }}
      push_branch: true

  create-hotfix-branch:
    if: ${{ inputs.branch_type == 'hotfix' }}
    needs: [next-version]
    uses: KiTechSoftware/stability-flow/.github/workflows/create-hotfix-branch.yml@main
    with:
      identifier: ${{ needs.next-version.outputs.next_version }}
      push_branch: true

  create-sync-branch:
    if: ${{ inputs.branch_type == 'sync' }}
    needs: [next-version]
    uses: KiTechSoftware/stability-flow/.github/workflows/create-sync-branch.yml@main
    with:
      identifier: ${{ needs.next-version.outputs.current_version }}
      push_branch: true

  create-release-pr:
    if: ${{ inputs.branch_type == 'release' && inputs.create_pr }}
    needs: [next-version, resolve-release-source, create-release-branch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "${{ needs.create-release-branch.outputs.branch }}" \
            --title "chore: Release ${{ needs.next-version.outputs.next_version }}" \
            --body "Automated release PR."

  create-sync-pr:
    if: ${{ inputs.branch_type == 'sync' && inputs.create_pr }}
    needs: [next-version, create-sync-branch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        
      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base develop \
            --head "${{ needs.create-sync-branch.outputs.branch }}" \
            --title "chore: Sync ${{ needs.next-version.outputs.current_version }}" \
            --body "Automated sync PR."
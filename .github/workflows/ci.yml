name: ci

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches:
      - main
      - develop
      - 'release/*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Rust dependencies and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workflows -> target

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workflows -> target

      - name: Build workspace
        run: cargo build --workspace --all-targets --all-features --locked

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workflows -> target

      - name: Test workspace
        run: cargo test --workspace --all-targets --all-features --locked

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workflows -> target

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-targets --all-features --locked --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: workflows/lcov.info

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workflows -> target

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit
name: validate-release

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-release:
    name: validate-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"
          SEMVER='^[0-9]+\.[0-9]+\.[0-9]+$'

          if [[ "$BASE" != "main" ]]; then
            echo "Not targeting main; skipping."
            exit 0
          fi

          if [[ ! "$HEAD" =~ ^release/ ]]; then
            echo "❌ main only accepts release/X.Y.Z"
            exit 1
          fi

          VERSION="${HEAD#release/}"

          if [[ ! "$VERSION" =~ $SEMVER ]]; then
            echo "❌ invalid release branch name: $HEAD"
            exit 1
          fi

          git fetch --tags

          LATEST="$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)"

          if [[ -n "$LATEST" ]]; then
            LATEST="${LATEST#v}"

            if [[ "$VERSION" == "$LATEST" ]]; then
              echo "❌ version already exists"
              exit 1
            fi

            HIGHEST="$(printf '%s\n%s\n' "$LATEST" "$VERSION" | sort -V | tail -n1)"
            if [[ "$HIGHEST" != "$VERSION" ]]; then
              echo "❌ version must be greater than latest tag ($LATEST)"
              exit 1
            fi
          fi

          echo "✅ release valid"